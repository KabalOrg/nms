<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NMS | Ultimate Dashboard</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #020617; font-family: 'Inter', sans-serif; color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.05); }
        .logo-text { background: linear-gradient(to right, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .unified-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); grid-auto-rows: 90px; grid-auto-flow: dense; gap: 12px; }
        .snmp-card { grid-column: span 1; grid-row: span 1; padding: 0.6rem 0.75rem !important; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; }
        .snmp-card.offline { border: 1px solid rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.05); }
        .name-clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2; }
        .deye-card { grid-column: span 2; grid-row: span 2; background: #161b28; border-radius: 20px; border: 2px solid #10b981; padding: 1rem !important; position: relative; display: flex; flex-direction: column; justify-content: space-between; height: 192px; }
        .deye-card.offline { border-color: #ef4444; }
        .deye-footer-panel { background: rgba(0, 0, 0, 0.3); border-radius: 12px; padding: 0.5rem 0.75rem; border: 1px solid rgba(255,255,255,0.03); }
        
        .client-power-bg { border: 1px solid rgba(59, 130, 246, 0.4) !important; background: rgba(30, 58, 138, 0.25) !important; }
        .no-sensor-bg { border: 1px solid rgba(148, 163, 184, 0.3) !important; background: rgba(15, 23, 42, 0.4) !important; }

        .circle-container { position: relative; width: 70px; height: 70px; }
        .circle-svg { transform: rotate(-90deg); width: 70px; height: 70px; }
        .circle-bg { fill: none; stroke: #1a202e; stroke-width: 10; }
        .circle-progress { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dasharray 0.5s ease; }

        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 15px 8px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .emergency { animation: pulse-red 2s infinite; }
        @keyframes critical-pulse { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.8); } 50% { box-shadow: 0 0 25px 12px rgba(220, 38, 38, 0.4); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.8); } }
        .critical-status { animation: critical-pulse 0.8s infinite !important; background: linear-gradient(135deg, rgba(127, 29, 29, 0.4) 0%, rgba(15, 23, 42, 0.9) 100%) !important; border: 2px solid #ff0000 !important; }
    </style>
</head>
<body class="p-4 md:p-8 flex flex-col min-h-screen">
    <div id="app" class="max-w-[1920px] mx-auto w-full flex-grow">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-6">
            <a href="index.html" class="group flex items-center gap-4 no-underline">
                <div class="bg-blue-600 p-2.5 rounded-2xl group-hover:bg-blue-500 transition-all shadow-lg shadow-blue-500/20"><i class="fas fa-server text-white text-xl"></i></div>
                <div>
                    <h1 class="text-2xl font-black logo-text uppercase leading-tight tracking-tighter">{{ nmsPrefix }} NMS</h1>
                    <span class="text-[8px] font-bold text-slate-500 tracking-[0.3em] uppercase block">Control Dashboard</span>
                </div>
            </a>
            <div class="flex flex-col sm:flex-row items-center gap-4">
                <div class="flex flex-wrap gap-2 justify-center">
                    <button v-for="city in citiesList" :key="city" @click="currentCity = city" 
                        class="glass px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all border border-white/5" 
                        :class="{ 'bg-blue-600 text-white border-blue-500 shadow-lg shadow-blue-500/20': currentCity === city }">
                        {{ city }}
                    </button>
                </div>
                <div class="flex gap-2">
                    <button @click="sortMode = sortMode === 'status' ? 'alpha' : 'status'" class="glass px-3.5 py-2.5 rounded-xl text-blue-400 border border-blue-500/20">
                        <i class="fas" :class="sortMode === 'status' ? 'fa-bolt' : 'fa-sort-alpha-down'"></i>
                    </button>
                    <a href="config.html" class="glass px-3.5 py-2.5 rounded-xl text-slate-400 border border-white/10 hover:bg-white/5"><i class="fas fa-cog"></i></a>
                </div>
            </div>
        </header>

        <div v-for="cityName in displayCities" :key="cityName" class="mb-12">
            <h2 class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] mb-4 flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></span> {{ cityName }}
            </h2>
            <div class="unified-grid">
                <template v-for="node in getNodes(cityName)" :key="node.id">
                    
                    <div v-if="node.type === 'deye'" class="deye-card" :class="getCardClass(node)">
                        <div class="flex justify-between items-start border-b border-white/5 pb-2">
                            <div class="min-w-0">
                                <h3 class="text-sm font-black text-white leading-tight truncate uppercase">{{ node.name }}</h3>
                                <p class="text-[7px] text-slate-500 font-bold mono truncate uppercase opacity-60">DEYE SUN-12K // {{ node.device_sn }}</p>
                            </div>
                            <div class="flex flex-col items-end gap-1">
                                <div v-if="node.powered_by_clients" @click.stop="activePhoneId !== node.id ? togglePhone(node.id) : null" class="px-2 py-0.5 rounded-md border text-[7px] font-black transition-all cursor-pointer select-none flex items-center gap-1" :class="(node.grid_on && !node.no_power_sensor) ? 'border-blue-500/20 text-blue-400/50 bg-blue-500/5 hover:text-blue-300' : 'border-blue-500/30 text-blue-400 bg-blue-500/10 hover:bg-blue-500/20'">
                                    <i class="fas" :class="activePhoneId === node.id ? 'fa-phone-alt' : 'fa-users'"></i> 
                                    <template v-if="activePhoneId === node.id">
                                        <a v-if="node.client_phone" :href="'tel:' + node.client_phone" @click.stop class="text-white mono underline decoration-blue-500/50 hover:text-blue-200 text-[11px] font-black tracking-wider">{{ node.client_phone }}</a>
                                        <span v-else class="text-white mono text-[11px] font-black tracking-wider">НЕ ВКАЗАНО</span>
                                        <i @click.stop="togglePhone(node.id)" class="fas fa-times text-slate-400 ml-1.5 hover:text-red-400 text-[10px]"></i>
                                    </template>
                                    <span v-else>ВІД КЛІЄНТІВ</span>
                                </div>
                                <div v-if="node.no_power_sensor" class="px-2 py-0.5 rounded-md border border-slate-500/30 text-slate-400 bg-slate-500/10 text-[7px] font-black">
                                    <i class="fas fa-eye-slash"></i> БЕЗ ДАТЧИКА
                                </div>
                                <div v-if="!node.powered_by_clients && !node.no_power_sensor" class="px-2 py-0.5 rounded-md border text-[7px] font-black" :class="node.grid_on ? 'border-green-500/30 text-green-500 bg-green-500/5' : 'border-red-500/30 text-red-500 bg-red-500/5'">
                                    {{ node.grid_on ? 'GRID ONLINE' : 'GRID OFFLINE' }}
                                </div>
                                <div v-if="node.gen_on" class="px-2 py-0.5 rounded bg-yellow-500 text-black text-[7px] font-black animate-pulse">GEN ON</div>
                            </div>
                        </div>

                        <div class="flex items-center gap-4 py-2">
                            <div class="circle-container">
                                <svg class="circle-svg" viewBox="0 0 100 100">
                                    <circle class="circle-bg" cx="50" cy="50" r="44"></circle>
                                    <circle class="circle-progress" cx="50" cy="50" r="44" :stroke="node.soc > 20 ? '#10b981' : '#ef4444'" :style="{ 'stroke-dasharray': (node.soc * 276.4 / 100) + ' 276.4' }"></circle>
                                </svg>
                                <div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-lg font-black text-white leading-none">{{ node.soc }}%</span></div>
                            </div>
                            <div class="flex-grow bg-black/20 rounded-xl p-3 flex flex-col justify-center border border-white/5">
                                <span class="text-[7px] font-black text-slate-500 uppercase tracking-widest mb-0.5">LOAD OUTPUT</span>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-3xl font-black text-blue-400 mono">{{ node.load_p }}</span>
                                    <span class="text-[9px] font-black text-blue-400/60 mono uppercase">W</span>
                                </div>
                            </div>
                        </div>
                        <div class="deye-footer-panel flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span v-if="node.is_lifepo4" class="px-1 py-0.5 bg-blue-500/20 text-blue-400 border border-blue-500/30 rounded text-[6px] font-black uppercase tracking-tighter">LifePo4</span>
                                <span class="text-xs font-black text-white mono leading-none">{{ node.total_val.toFixed(0) }}W</span>
                                <i class="fas fa-bolt text-slate-600 text-[8px] ml-0.5"></i>
                            </div>
                            <div class="flex items-center gap-1.5 border-l border-white/10 pl-2">
                                <i class="far fa-clock text-slate-600 text-[8px]"></i><span class="text-[9px] font-black text-slate-300 mono uppercase">{{ node.updated }}</span>
                            </div>
                        </div>
                    </div>

                    <div v-else class="glass snmp-card relative flex flex-col justify-between" :class="getCardClass(node)">
                        <div class="flex justify-between items-start gap-1">
                            <div class="name-clamp flex-grow min-w-0">
                                <p class="font-black uppercase text-[11px] text-slate-300 leading-none truncate">{{ node.name }}</p>
                                
                                <p v-if="!node.grid_on && !node.no_power_sensor" class="text-[9px] text-red-400 font-bold mt-1.5 flex items-center gap-1">
                                    <i class="fas fa-clock"></i> {{ formatOfflineTime(node.grid_offline_since) }}
                                </p>
                                
                                <div class="flex flex-col gap-0.5 mt-1.5">
                                    <div v-if="node.powered_by_clients" @click.stop="activePhoneId !== node.id ? togglePhone(node.id) : null" class="text-[8px] font-bold flex items-center gap-1 transition-all cursor-pointer select-none w-max" :class="(node.grid_on && !node.no_power_sensor) ? 'text-blue-500/50 hover:text-blue-400' : 'text-blue-400 hover:text-white'">
                                        <i class="fas" :class="activePhoneId === node.id ? 'fa-phone-alt' : 'fa-users'"></i>
                                        <template v-if="activePhoneId === node.id">
                                            <span class="text-white bg-blue-500/30 px-1.5 py-0.5 rounded flex items-center gap-1.5 mono text-[11px] font-black tracking-wider" @click.stop>
                                                <a v-if="node.client_phone" :href="'tel:' + node.client_phone" class="underline decoration-blue-300/50 hover:text-blue-100">{{ node.client_phone }}</a>
                                                <span v-else>НЕ ВКАЗАНО</span>
                                                <i @click.stop="togglePhone(node.id)" class="fas fa-times text-blue-300 hover:text-red-400 cursor-pointer text-[10px]"></i>
                                            </span>
                                        </template>
                                        <span v-else>ВІД КЛІЄНТІВ</span>
                                    </div>
                                    <p v-if="node.no_power_sensor" class="text-[8px] text-slate-400 font-bold flex items-center gap-1 mt-0.5">
                                        <i class="fas fa-eye-slash"></i> БЕЗ ДАТЧИКА
                                    </p>
                                </div>
                            </div>
                            <span class="font-black text-[11px] shrink-0 mono" :class="node.soc > 20 ? 'text-green-400' : 'text-red-400'">{{ node.soc }}%</span>
                        </div>
                        <div class="flex items-center justify-between border-t border-white/5 pt-1.5">
                            <div class="flex items-center gap-1">
                                <span class="font-bold text-white text-[11px] mono">{{ node.total_val.toFixed(1) }}V</span>
                                <span v-if="node.is_lifepo4" class="px-1 bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded text-[7px] font-black uppercase leading-tight">LifePo4</span>
                            </div>
                            <i class="fas" :class="getIconClass(node)" style="font-size: 10px;"></i>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <div class="mt-8 glass rounded-2xl p-4 border-blue-500/10">
            <h2 class="text-[9px] font-black text-blue-500 uppercase tracking-[0.4em] mb-4 flex items-center gap-2"><i class="fas fa-history"></i> Останні події</h2>
            <div class="space-y-1.5 overflow-y-auto max-h-60 pr-2">
                <div v-for="e in history" :key="e.time+e.msg" class="flex gap-3 text-[10px] p-2 rounded-lg bg-white/5 border border-white/5 items-center">
                    <span class="text-slate-500 font-bold mono shrink-0">{{ e.date }} {{ e.time }}</span><span class="text-slate-200">{{ e.msg }}</span>
                </div>
                <div v-if="history.length === 0" class="text-xs text-slate-500 italic p-2">Немає записів...</div>
            </div>
        </div>
    </div>
    
    <footer class="mt-12 mb-4 text-center text-[10px] text-white/20 font-bold uppercase tracking-widest mono select-none">
        powered by kabal 2026
    </footer>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const rawNodes = ref({}); const history = ref([]); const currentCity = ref('ВСІ'); const sortMode = ref('status');
                const activePhoneId = ref(null); 
                const nmsPrefix = ref('KABAL'); // Дефолтне значення

                const fetchInfo = async () => {
                    try {
                        const r = await fetch('/api/info');
                        const d = await r.json();
                        nmsPrefix.value = d.prefix.toUpperCase();
                        document.title = `${nmsPrefix.value} NMS | Ultimate Dashboard`;
                    } catch(e) {}
                };

                const fetchData = async () => { try { const r = await fetch('/api/status'); const d = await r.json(); rawNodes.value = d.nodes || {}; history.value = d.history || []; } catch(e){} };
                
                const sortedCityNames = computed(() => { 
                    const nodesArray = Object.values(rawNodes.value);
                    const c = new Set(nodesArray.map(n => n.city ? n.city.trim() : '')); 
                    let list = Array.from(c).filter(x => x).sort(); 
                    const kIdx = list.indexOf('Кременчук'); 
                    if(kIdx > -1) { list.splice(kIdx, 1); list.unshift('Кременчук'); } 
                    return list; 
                });

                const citiesList = computed(() => ['ВСІ', ...sortedCityNames.value]);
                const displayCities = computed(() => { if (currentCity.value === 'ВСІ') return sortedCityNames.value; return sortedCityNames.value.filter(c => c === currentCity.value); });
                
                const togglePhone = (id) => { if (activePhoneId.value === id) { activePhoneId.value = null; } else { activePhoneId.value = id; } };

                const isEmergency = (ts) => ts > 0 && (Math.floor(Date.now() / 1000) - ts) > 7200;
                const isCritical = (ts) => ts > 0 && (Math.floor(Date.now() / 1000) - ts) > 21600;

                const getCardClass = (node) => {
                    let classes = [];
                    if (node.no_power_sensor && !node.powered_by_clients) { classes.push('no-sensor-bg'); } 
                    else if (node.powered_by_clients && (!node.grid_on || node.no_power_sensor)) { classes.push('client-power-bg'); } 
                    else if (!node.grid_on && !node.no_power_sensor) { classes.push('offline'); }

                    if (!node.grid_on && !node.no_power_sensor) {
                        if (isCritical(node.grid_offline_since)) { classes.push('critical-status'); } 
                        else if (isEmergency(node.grid_offline_since)) { classes.push('emergency'); }
                    }
                    return classes.join(' ');
                };

                const getIconClass = (node) => {
                    if (node.powered_by_clients && (!node.grid_on || node.no_power_sensor)) return 'fa-users text-blue-400';
                    if (node.no_power_sensor) return 'fa-network-wired text-slate-500';
                    if (node.grid_on) return 'fa-plug text-green-500';
                    return 'fa-battery-half text-red-500';
                };

                const getNodes = (city) => {
                    let list = Object.values(rawNodes.value).filter(n => (n.city || '').trim() === city.trim());
                    list.sort((a,b) => {
                        if (a.type !== b.type) return a.type === 'deye' ? -1 : 1;
                        if (sortMode.value === 'status') {
                            const weight = (n) => {
                                if (n.no_power_sensor) return 0;
                                if (n.grid_on) return 1; 
                                if (isCritical(n.grid_offline_since)) return 4;
                                if (isEmergency(n.grid_offline_since)) return 3;
                                return 2;
                            };
                            let wA = weight(a); let wB = weight(b);
                            if (wA !== wB) return wB - wA;
                            if (wA >= 2 && wB >= 2) { if (a.grid_offline_since !== b.grid_offline_since) { return a.grid_offline_since - b.grid_offline_since; } }
                        }
                        return a.name.localeCompare(b.name);
                    });
                    return list;
                };

                const formatOfflineTime = (ts) => {
                    if (!ts) return '';
                    const diff = Math.floor(Date.now() / 1000) - ts;
                    const m = Math.floor(diff / 60) % 60; const h = Math.floor(diff / 3600);
                    return h > 0 ? `${h}г ${m}хв` : `${m}хв`;
                };

                onMounted(() => { fetchInfo(); fetchData(); setInterval(fetchData, 10000); });
                return { sortedCityNames, displayCities, citiesList, currentCity, getNodes, history, isEmergency, isCritical, formatOfflineTime, sortMode, getCardClass, getIconClass, activePhoneId, togglePhone, nmsPrefix };
            }
        }).mount('#app');
    </script>
</body>
</html>
